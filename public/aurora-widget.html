<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aurora Life OS</title>
<style>
:root{color-scheme:dark;--bg:#090b14;--p:#12172a;--p2:#181f37;--text:#f7f8ff;--muted:#9aa5c2;--accent:#8067ff;--cyan:#35dce4;--good:#55dc91;--line:rgba(255,255,255,.1)}
*{box-sizing:border-box}body{margin:0;padding:12px;background:transparent;color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.shell{max-width:680px;margin:auto;background:radial-gradient(circle at 8% 0,rgba(128,103,255,.28),transparent 35%),var(--bg);border:1px solid var(--line);border-radius:24px;padding:16px;overflow:hidden}
header{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--cyan));font-weight:900}.title{font-weight:800}.sub{font-size:12px;color:var(--muted)}
.hero{margin-top:14px;padding:18px;border-radius:20px;background:linear-gradient(145deg,rgba(128,103,255,.22),rgba(53,220,228,.08)),var(--p);border:1px solid var(--line)}
.kicker{font-size:11px;color:#cbd1e7}.row{display:flex;justify-content:space-between;align-items:end}.score{font-size:48px;font-weight:850;letter-spacing:-3px}.score small{font-size:13px;color:var(--muted);letter-spacing:0}.badge{padding:7px 10px;border-radius:999px;background:rgba(85,220,145,.13);color:var(--good);font-size:12px;font-weight:700}
.brief{font-size:14px;line-height:1.45;color:#e1e5f5;margin-top:8px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.metric{padding:12px;background:var(--p);border:1px solid var(--line);border-radius:15px}.label{font-size:11px;color:var(--muted)}.value{font-size:19px;font-weight:750;margin-top:5px}
.bar{height:5px;background:rgba(255,255,255,.07);border-radius:99px;margin-top:8px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:99px}
.section{display:flex;justify-content:space-between;align-items:center;margin:16px 2px 8px}.section b{font-size:14px}.section button,.ask button{border:0;border-radius:11px;padding:8px 11px;background:rgba(128,103,255,.18);color:#c9c1ff;font-weight:700;cursor:pointer}
.tasks{display:flex;flex-direction:column;gap:7px}.task{display:flex;align-items:center;gap:10px;padding:11px;background:var(--p);border:1px solid var(--line);border-radius:14px}.check{width:25px;height:25px;border:1px solid rgba(255,255,255,.25);border-radius:8px;background:none;color:#07120c;cursor:pointer}.task.done{opacity:.55}.task.done .check{background:var(--good)}.task.done .tn{text-decoration:line-through}.tm{flex:1}.tn{font-size:13px;font-weight:700}.td{font-size:11px;color:var(--muted);margin-top:2px}.tag{font-size:10px;color:#c9c1ff;background:rgba(128,103,255,.15);padding:5px 7px;border-radius:999px}
.ask{display:flex;gap:8px;margin-top:12px}.ask input{flex:1;background:var(--p2);border:1px solid var(--line);border-radius:12px;color:white;padding:11px;outline:none}.ask button{background:linear-gradient(135deg,var(--accent),#5c48d8);color:white}
.status{font-size:11px;color:var(--muted);margin-top:8px;min-height:15px}
@media(max-width:560px){.metrics{grid-template-columns:1fr 1fr}.score{font-size:42px}.ask{display:grid}.row{align-items:start;gap:8px;flex-direction:column}}
</style>
</head>
<body>
<main class="shell">
<header><div class="logo">A</div><div><div class="title">Aurora Life OS</div><div class="sub">Your ChatGPT action dashboard</div></div></header>
<section class="hero"><div class="kicker">PERSONAL OPERATING SCORE</div><div class="row"><div class="score" id="score">--<small>/100</small></div><div class="badge" id="badge">Loading</div></div><div class="brief" id="brief">Preparing today's recommendation...</div></section>
<section class="metrics">
<div class="metric"><div class="label">Monthly spend</div><div class="value" id="spend">--</div><div class="bar"><i id="spendBar"></i></div></div>
<div class="metric"><div class="label">Focus time</div><div class="value" id="focus">--</div><div class="bar"><i id="focusBar"></i></div></div>
<div class="metric"><div class="label">Energy</div><div class="value" id="energy">--</div><div class="bar"><i id="energyBar"></i></div></div>
<div class="metric"><div class="label">Completed</div><div class="value" id="progress">--</div><div class="bar"><i id="progressBar"></i></div></div>
</section>
<div class="section"><b>AI ranked plan</b><button id="replan">Replan</button></div>
<section class="tasks" id="tasks"></section>
<div class="ask"><input id="question" placeholder="Example: I feel tired. What should I do first?"/><button id="askBtn">Analyse</button></div>
<div class="status" id="status"></div>
</main>
<script type="module">
let data=null,rpcId=0;const pending=new Map();const $=id=>document.getElementById(id);const standalone=window.parent===window;
let localData={profile:{spend:3840,focusMinutes:222,energy:72,doneCount:7,score:75,brief:"Local preview mode is active. In ChatGPT, the same widget is driven by the MCP bridge."},tasks:[
 {id:"t1",title:"Finish today's highest-impact work",detail:"45 min - deep work",tag:"High priority",completed:false},
 {id:"t2",title:"Review one recurring subscription",detail:"8 min - save cash",tag:"Money",completed:false},
 {id:"t3",title:"Walk for 25 minutes",detail:"Before 6:30pm - recovery",tag:"Health",completed:false},
 {id:"t4",title:"Prepare tomorrow's first task",detail:"5 min - reduce friction",tag:"Simple",completed:false}
]};
function score(profile){const spendScore=Math.max(25,100-profile.spend/70),focusScore=Math.min(100,profile.focusMinutes/3),progressScore=Math.min(100,profile.doneCount/11*100);return Math.round(spendScore*.2+focusScore*.3+profile.energy*.2+progressScore*.3)}
function localPayload(brief){const profile={...localData.profile,score:score(localData.profile),brief:brief||localData.profile.brief};localData={...localData,profile};return localData}
function request(method,params){return new Promise((resolve,reject)=>{const id=++rpcId;pending.set(id,{resolve,reject});window.parent.postMessage({jsonrpc:"2.0",id,method,params},"*")})}
function notify(method,params){window.parent.postMessage({jsonrpc:"2.0",method,params},"*")}
if(!standalone)window.addEventListener("message",e=>{if(e.source!==window.parent)return;const m=e.data;if(!m||m.jsonrpc!=="2.0")return;
 if(typeof m.id==="number"){const p=pending.get(m.id);if(!p)return;pending.delete(m.id);m.error?p.reject(m.error):p.resolve(m.result);return}
 if(m.method==="ui/notifications/tool-result")update(m.params?.structuredContent);
},{passive:true});
const ready=standalone?Promise.resolve():(async()=>{await request("ui/initialize",{appInfo:{name:"aurora-life-os",version:"0.1.0"},appCapabilities:{},protocolVersion:"2026-01-26"});notify("ui/notifications/initialized",{})})();
async function localCall(name,args={}){if(name==="complete_task"){localData.tasks=localData.tasks.map(t=>t.id===args.id?{...t,completed:true}:t);localData.profile.doneCount+=1;return localPayload("Local preview: task completed.")}
 if(name==="replan_day"){localData.tasks=[{id:"r1",title:"Finish one task before opening email",detail:"30 min - focus",tag:"High priority",completed:false},{id:"r2",title:"Do a 10-minute money check",detail:"Review one recurring cost",tag:"Money",completed:false},{id:"r3",title:"Walk outside for 20 minutes",detail:"Before energy dips",tag:"Health",completed:false},{id:"r4",title:"Write two shutdown notes",detail:"5 min - help tomorrow",tag:"Simple",completed:false}];return localPayload("Local preview: today has been replanned.")}
 if(name==="analyse_day"){const q=(args.question||"").toLowerCase();let brief="Local preview: finish one 30-minute focus block, then handle low-value admin.";if(q.includes("tired")||q.includes("energy")||q.includes("sleep"))brief="Local preview: lower cognitive load, walk for 20 minutes, and shut work down early.";if(q.includes("money")||q.includes("spend")||q.includes("save"))brief="Local preview: review one recurring cost and set a 24-hour delay for non-essential purchases.";return localPayload(brief)}
 return localPayload()}
async function call(name,args={}){await ready;$("status").textContent="Aurora is working...";try{const r=standalone?{structuredContent:await localCall(name,args)}:await request("tools/call",{name,arguments:args});update(r?.structuredContent);$("status").textContent=standalone?"Local preview updated":"Updated";setTimeout(()=>$("status").textContent="",1400)}catch(e){$("status").textContent="Action failed. Try again.";console.error(e)}}
function update(next){if(!next||!next.profile)return;data=next;const p=next.profile;
 $("score").innerHTML=`${p.score}<small>/100</small>`;$("badge").textContent=p.score>=75?"Up - steady":"Adjust";$("brief").textContent=p.brief;
 $("spend").textContent=`$${Number(p.spend).toLocaleString()}`;$("focus").textContent=`${Math.floor(p.focusMinutes/60)}h ${p.focusMinutes%60}m`;$("energy").textContent=`${p.energy}%`;$("progress").textContent=`${p.doneCount}/11`;
 $("spendBar").style.width=Math.max(12,100-p.spend/60)+"%";$("focusBar").style.width=Math.min(100,p.focusMinutes/3)+"%";$("energyBar").style.width=p.energy+"%";$("progressBar").style.width=(p.doneCount/11*100)+"%";
 $("tasks").innerHTML=next.tasks.map(t=>`<div class="task ${t.completed?"done":""}"><button class="check" data-id="${t.id}">${t.completed?"OK":""}</button><div class="tm"><div class="tn">${escapeHtml(t.title)}</div><div class="td">${escapeHtml(t.detail)}</div></div><div class="tag">${escapeHtml(t.tag)}</div></div>`).join("");
}
function escapeHtml(v){const d=document.createElement("div");d.textContent=v;return d.innerHTML}
$("tasks").addEventListener("click",e=>{const b=e.target.closest(".check");if(b)call("complete_task",{id:b.dataset.id})});
$("replan").addEventListener("click",()=>call("replan_day",{reason:"User requested a fresh plan"}));
$("askBtn").addEventListener("click",()=>{const q=$("question").value.trim();if(!q)return;call("analyse_day",{question:q});$("question").value=""});
ready.then(()=>call("show_dashboard",{})).catch(console.error);
</script>
</body>
</html>
