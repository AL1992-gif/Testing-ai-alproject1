<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>BRP Competitor & Industry Monitor</title><style>:root{--bg:#07111f;--panel:#0e1b2d;--panel2:#12243b;--line:#293c56;--text:#eef5ff;--muted:#9fb0c7;--teal:#55d6be;--blue:#72aaff;--amber:#ffc857}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#07111f,#091522);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{max-width:1100px;margin:auto;padding:18px 15px 70px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}.eyebrow{font-size:11px;letter-spacing:.16em;color:var(--teal);font-weight:800}.title{font-size:27px;margin:4px 0}.subtitle,.stamp{color:var(--muted);font-size:12px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}.metric,.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 16px 45px #0004}.metric strong{display:block;font-size:30px;margin-top:6px}.metric span{font-size:12px;color:var(--muted)}.tabs{display:flex;gap:8px;margin:16px 0;position:sticky;top:0;padding:10px 0;background:#07111fe8;backdrop-filter:blur(12px);z-index:2}.tab,.brand{border:1px solid #304761;background:#102238;color:var(--text);padding:9px 13px;border-radius:999px}.tab.active,.brand.active{background:var(--teal);border-color:var(--teal);color:#04110f;font-weight:800}.section{display:none}.section.active{display:block}.controls{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}.item{padding:15px 0;border-bottom:1px solid #253850}.item:last-child{border-bottom:0}.meta{font-size:11px;color:var(--muted);margin-bottom:6px}.headline{font-size:16px;font-weight:750;line-height:1.4;color:var(--text);text-decoration:none}.desc{font-size:13px;color:#c5d2e3;line-height:1.45;margin:7px 0}.row{display:flex;justify-content:space-between;align-items:center;gap:12px}.pill{font-size:10px;font-weight:800;border-radius:999px;padding:5px 8px;background:#443817;color:#ffe08a}.open{color:var(--blue);font-size:12px;text-decoration:none}.empty{padding:35px;text-align:center;color:var(--muted)}h2{font-size:18px;margin:0 0 12px}@media(max-width:700px){.summary{grid-template-columns:1fr 1fr}.metric:last-child{grid-column:span 2}.top{display:block}.stamp{margin-top:8px}.headline{font-size:15px}}</style></head><body><main class="shell"><header class="top"><div><div class="eyebrow">BRP AUSTRALIA</div><h1 class="title">Competitor & Industry Monitor</h1><div class="subtitle">Competitor promotions and powersports / marine industry news only</div></div><div class="stamp" id="stamp">Loading…</div></header><section class="summary"><div class="metric"><span>Promotion signals</span><strong id="promoCount">—</strong></div><div class="metric"><span>Industry stories</span><strong id="newsCount">—</strong></div><div class="metric"><span>Brands monitored</span><strong id="brandCount">—</strong></div></section><nav class="tabs"><button class="tab active" data-view="promotions">Promotions</button><button class="tab" data-view="industry">Industry News</button></nav><section id="promotions" class="section active"><article class="card"><h2>Competitor promotions</h2><div class="controls" id="brandFilters"></div><div id="promotionList"></div></article></section><section id="industry" class="section"><article class="card"><h2>Industry-related news</h2><div id="industryList"></div></article></section></main><script>const $=id=>document.getElementById(id);const state={data:null,brand:'All'};const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const ago=v=>{const d=new Date(v);if(isNaN(d))return'Recent';const h=Math.max(0,Math.floor((Date.now()-d)/36e5));return h<1?'Just now':h<24?`${h}h ago`:`${Math.floor(h/24)}d ago`};function item(x,promo=false){return `<div class="item"><div class="meta">${promo?`<span class="pill">${esc(x.brand)} · ${esc(x.promotionType)}</span> · `:''}${esc(x.source)} · ${ago(x.publishedAt)}</div><a class="headline" href="${esc(x.link)}" target="_blank" rel="noopener">${esc(x.title)}</a>${x.description?`<div class="desc">${esc(x.description)}</div>`:''}<div class="row"><span></span><a class="open" href="${esc(x.link)}" target="_blank" rel="noopener">Open source ↗</a></div></div>`}function renderPromos(){const rows=state.brand==='All'?state.data.promotions:state.data.promotions.filter(x=>x.brand===state.brand);$('promotionList').innerHTML=rows.length?rows.map(x=>item(x,true)).join(''):'<div class="empty">No current promotion signals for this brand.</div>';const brands=['All',...state.data.brands];$('brandFilters').innerHTML=brands.map(b=>`<button class="brand ${b===state.brand?'active':''}" data-brand="${esc(b)}">${esc(b)}</button>`).join('');document.querySelectorAll('[data-brand]').forEach(b=>b.onclick=()=>{state.brand=b.dataset.brand;renderPromos()})}function render(){const d=state.data;$('stamp').textContent=`Updated ${new Date(d.generatedAt).toLocaleString('en-AU')}`;$('promoCount').textContent=d.promotionCount;$('newsCount').textContent=d.industryNewsCount;$('brandCount').textContent=d.brands.length;renderPromos();$('industryList').innerHTML=d.industryNews.length?d.industryNews.map(x=>item(x,false)).join(''):'<div class="empty">No industry stories retrieved.</div>'}document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.section').forEach(x=>x.classList.toggle('active',x.id===b.dataset.view))});(async()=>{try{const r=await fetch(`./data.json?t=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw Error(r.status);state.data=await r.json();render()}catch(e){$('stamp').textContent='Feed error';$('promotionList').innerHTML='<div class="empty">Unable to load data.</div>'}})();</script></body></html>
