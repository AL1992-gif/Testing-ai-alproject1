name: AU Finance Pulse

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/generate_news.py"
      - ".github/workflows/au-finance-pages.yml"
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "au-finance-pages"
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Refresh Australian finance feeds
        run: python scripts/generate_news.py

      - name: Save refreshed feed to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/news.json; then
            echo "No feed changes to commit on main"
          else
            git add docs/news.json
            git commit -m "Refresh Australian finance news [skip ci]"
            git push origin main
          fi

      - name: Publish current docs site to gh-pages
        run: |
          git fetch origin gh-pages
          rm -rf /tmp/au-finance-pages
          git worktree add --detach /tmp/au-finance-pages origin/gh-pages
          find /tmp/au-finance-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R docs/. /tmp/au-finance-pages/
          touch /tmp/au-finance-pages/.nojekyll
          cd /tmp/au-finance-pages
          git add -A
          if git diff --cached --quiet; then
            echo "Published site is already current"
          else
            git commit -m "Publish live AU Finance feed [skip ci]"
            git push origin HEAD:gh-pages
          fi
