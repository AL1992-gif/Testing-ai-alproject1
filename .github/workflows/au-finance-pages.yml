name: AU Finance Pulse

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/generate_news.py"
      - ".github/workflows/au-finance-pages.yml"
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "au-finance-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Refresh Australian finance feeds
        run: python scripts/generate_news.py

      - name: Save refreshed feed to the repository
        run: |
          if git diff --quiet -- docs/news.json; then
            echo "No feed changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/news.json
            git commit -m "Refresh Australian finance news [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
