<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>Reset AU Finance Pulse</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07111f;color:#eaf2ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(86vw,420px);padding:28px;border:1px solid #26364c;border-radius:22px;background:#0d1a2b;text-align:center;box-shadow:0 20px 70px #0008}.spinner{width:34px;height:34px;margin:0 auto 18px;border:3px solid #33465f;border-top-color:#55d6be;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{color:#a9b8cc;line-height:1.5}</style></head><body><main class="card"><div class="spinner"></div><h1>Updating AU Finance Pulse</h1><p id="status">Removing the old offline cache and loading the current feed…</p></main><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('au-finance-pulse')).map(k=>caches.delete(k)))}document.getElementById('status').textContent='Cache cleared. Opening the updated feed…';setTimeout(()=>location.replace('./?build=20260715.5'),500)}catch(e){document.getElementById('status').textContent='Opening the updated feed…';setTimeout(()=>location.replace('./?build=20260715.5'),800)}})();</script></body></html>
